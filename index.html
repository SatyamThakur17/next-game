<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXT™ — A Game of Inconvenience</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: white; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const BUTTON_TEXTS = ["Next", "Are you sure?", "This might delete everything", "Probably safe", "Trust me"];
    const FLASH_MESSAGES = [
      "You're doing great.",
      "Most users quit by now.",
      "This is normal.",
      "Please remain calm.",
      "Syncing your progress...",
      "Almost there. (not really)",
      "Thank you for your patience.",
      "Your session will not expire.",
      "We value your time.",
    ];

    const rand = (min, max) => Math.random() * (max - min) + min;
    const randInt = (min, max) => Math.floor(rand(min, max));

    function NextGame() {
      const [level, setLevel] = useState(1);
      const [cycle, setCycle] = useState(0);
      const [showModal, setShowModal] = useState(false);
      const [showModal2, setShowModal2] = useState(false);
      const [holdProgress, setHoldProgress] = useState(0);
      const [isHolding, setIsHolding] = useState(false);
      const [btnPos, setBtnPos] = useState({ x: 50, y: 50 });
      const [progressVal, setProgressVal] = useState(12);
      const [btnText, setBtnText] = useState("Next");
      const [tilt, setTilt] = useState(0);
      const [flashMsg, setFlashMsg] = useState("");
      const [showFlash, setShowFlash] = useState(false);
      const [clickLag, setClickLag] = useState(false);
      const [misalign] = useState(() =>
        Array.from({ length: 8 }, () => ({
          x: rand(-4, 4),
          y: rand(-3, 3),
          rot: rand(-1.5, 1.5),
          size: rand(-1, 2),
        }))
      );
      const [btnFontSize, setBtnFontSize] = useState(14);
      const [showCongrats, setShowCongrats] = useState(false);

      const holdStartRef = useRef(null);
      const holdRafRef = useRef(null);
      const btnPosTimerRef = useRef(null);
      const progressTimerRef = useRef(null);
      const btnTextTimerRef = useRef(null);
      const tiltTimerRef = useRef(null);
      const flashTimerRef = useRef(null);
      const fontTimerRef = useRef(null);

      const activeLevel = ((level - 1) % 10) + 1;

      const isActive = useCallback(
        (n) => activeLevel >= n || (cycle > 0 && n <= 10),
        [activeLevel, cycle]
      );

      // Level 5: roaming button
      useEffect(() => {
        clearInterval(btnPosTimerRef.current);
        if (isActive(5)) {
          btnPosTimerRef.current = setInterval(() => {
            setBtnPos({ x: rand(15, 75), y: rand(30, 65) });
          }, 2000);
        }
        return () => clearInterval(btnPosTimerRef.current);
      }, [level, cycle]);

      // Level 6: fake progress
      useEffect(() => {
        clearInterval(progressTimerRef.current);
        if (isActive(6)) {
          progressTimerRef.current = setInterval(() => {
            setProgressVal((p) => {
              const next = p + rand(-8, 5);
              return Math.max(3, Math.min(97, next));
            });
          }, 900);
        }
        return () => clearInterval(progressTimerRef.current);
      }, [level, cycle]);

      // Level 8: button text cycling
      useEffect(() => {
        clearInterval(btnTextTimerRef.current);
        if (isActive(8)) {
          let i = 0;
          btnTextTimerRef.current = setInterval(() => {
            i = (i + 1) % BUTTON_TEXTS.length;
            setBtnText(BUTTON_TEXTS[i]);
          }, 1100);
        } else {
          setBtnText("Next");
        }
        return () => clearInterval(btnTextTimerRef.current);
      }, [level, cycle]);

      // Level 9: tilt
      useEffect(() => {
        clearInterval(tiltTimerRef.current);
        if (isActive(9)) {
          tiltTimerRef.current = setInterval(() => {
            setTilt((t) => t + rand(0.02, 0.08));
          }, 80);
        }
        return () => clearInterval(tiltTimerRef.current);
      }, [level, cycle]);

      // Flash messages
      useEffect(() => {
        flashTimerRef.current = setInterval(() => {
          if (Math.random() < 0.3) {
            setFlashMsg(FLASH_MESSAGES[randInt(0, FLASH_MESSAGES.length)]);
            setShowFlash(true);
            setTimeout(() => setShowFlash(false), 2400);
          }
        }, 5000);
        return () => clearInterval(flashTimerRef.current);
      }, []);

      // Font size drift
      useEffect(() => {
        fontTimerRef.current = setInterval(() => {
          setBtnFontSize(rand(12, 17));
        }, 1800);
        return () => clearInterval(fontTimerRef.current);
      }, []);

      const advanceLevel = useCallback(() => {
        setHoldProgress(0);
        setIsHolding(false);
        setClickLag(false);

        if (activeLevel === 10) {
          setShowCongrats(true);
          setTimeout(() => {
            setShowCongrats(false);
            setCycle((c) => c + 1);
            setLevel((l) => l + 1);
            setTilt(0);
          }, 3000);
          return;
        }
        setLevel((l) => l + 1);
      }, [level, activeLevel]);

      const handleNextClick = useCallback(() => {
        const needsModal = isActive(4);
        if (isActive(7)) {
          setClickLag(true);
          setTimeout(() => {
            setClickLag(false);
            if (needsModal) {
              setShowModal(true);
            } else {
              advanceLevel();
            }
          }, 300);
        } else if (needsModal) {
          setShowModal(true);
        } else {
          advanceLevel();
        }
      }, [activeLevel, cycle, isActive, advanceLevel]);

      // Level 2: button dodges cursor
      const handleMouseMove = useCallback(
        (e) => {
          if (!isActive(2) || isActive(5)) return;
          const btn = document.getElementById("next-btn");
          if (!btn) return;
          const rect = btn.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dx = e.clientX - cx;
          const dy = e.clientY - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            const angle = Math.atan2(dy, dx);
            btn.style.transform = `translate(${-Math.cos(angle) * 55}px, ${-Math.sin(angle) * 40}px)`;
          } else {
            btn.style.transform = "";
          }
        },
        [level, cycle]
      );

      // Level 3: hold to confirm
      const startHold = useCallback(() => {
        if (!isActive(3)) return;
        setIsHolding(true);
        holdStartRef.current = performance.now();
        const animate = () => {
          const elapsed = performance.now() - holdStartRef.current;
          const pct = Math.min(100, (elapsed / 3000) * 100);
          setHoldProgress(pct);
          if (pct < 100) {
            holdRafRef.current = requestAnimationFrame(animate);
          } else {
            setIsHolding(false);
            handleNextClick();
          }
        };
        holdRafRef.current = requestAnimationFrame(animate);
      }, [level, cycle, handleNextClick]);

      const cancelHold = useCallback(() => {
        if (!isActive(3)) return;
        cancelAnimationFrame(holdRafRef.current);
        setHoldProgress(0);
        setIsHolding(false);
      }, [level, cycle]);

      const fakePercent = Math.min(97, Math.floor(progressVal));

      const getLevelLabel = () => {
        if (showCongrats) return "Congratulations.";
        if (activeLevel === 10) return "Final Level";
        return `Level ${level}`;
      };

      const getLevelSubtitle = () => {
        const subtitles = [
          "Welcome. Please proceed.",
          "We've made a small adjustment.",
          "Hold on. Literally.",
          "We just need to confirm a few things.",
          "The button will come to you. Eventually.",
          "Progress is being measured.",
          "Response times may vary.",
          "Please read carefully before proceeding.",
          "This is fine.",
          "You've reached the end.",
        ];
        if (showCongrats) return "Unlocking Hard Mode™";
        return subtitles[(activeLevel - 1) % subtitles.length];
      };

      const roamingBtnStyle = {
        position: "fixed",
        left: `${btnPos.x}%`,
        top: `${btnPos.y}%`,
        transform: "translate(-50%, -50%)",
        zIndex: 40,
        fontSize: `${btnFontSize}px`,
        transition: "left 1.8s cubic-bezier(0.4,0,0.2,1), top 1.8s cubic-bezier(0.4,0,0.2,1)",
      };

      const staticBtnStyle = {
        fontSize: `${btnFontSize}px`,
        transition: "font-size 0.4s",
      };

      const btnBaseClass = [
        "px-8 py-3 bg-gray-900 text-white rounded-lg font-medium tracking-tight select-none",
        clickLag ? "opacity-60 cursor-wait" : "hover:bg-gray-800 active:scale-95",
        isHolding ? "ring-2 ring-gray-300" : "",
      ].join(" ");

      const renderButton = () => {
        const label = clickLag ? "Processing..." : btnText;
        if (isActive(5)) {
          return (
            <button
              id="next-btn"
              className={btnBaseClass}
              style={roamingBtnStyle}
              onMouseDown={isActive(3) ? startHold : undefined}
              onMouseUp={isActive(3) ? cancelHold : undefined}
              onMouseLeave={isActive(3) ? cancelHold : undefined}
              onClick={isActive(3) ? undefined : handleNextClick}
              disabled={clickLag}
            >
              {label}
            </button>
          );
        }
        return (
          <button
            id="next-btn"
            className={btnBaseClass}
            style={{ ...staticBtnStyle, transition: "transform 0.15s ease, background 0.15s, font-size 0.4s" }}
            onMouseDown={isActive(3) ? startHold : undefined}
            onMouseUp={isActive(3) ? cancelHold : undefined}
            onMouseLeave={isActive(3) ? cancelHold : undefined}
            onClick={isActive(3) ? undefined : handleNextClick}
            disabled={clickLag}
          >
            {label}
          </button>
        );
      };

      return (
        <div
          className="min-h-screen bg-white flex flex-col"
          style={{
            transform: isActive(9) ? `rotate(${tilt}deg)` : undefined,
            transformOrigin: "center center",
            transition: isActive(9) ? "transform 0.08s linear" : undefined,
            fontFamily: "'Helvetica Neue', Arial, sans-serif",
          }}
          onMouseMove={handleMouseMove}
        >
          {/* Top bar */}
          <div
            className="border-b border-gray-100 px-8 py-4 flex items-center justify-between"
            style={{ transform: `translate(${misalign[0].x}px, ${misalign[0].y}px)` }}
          >
            <div className="flex items-center gap-3">
              <div className="w-6 h-6 bg-black rounded-sm flex items-center justify-center">
                <span style={{ color: "white", fontSize: 11, fontWeight: 700 }}>N</span>
              </div>
              <span className="text-sm font-medium text-gray-900 tracking-tight">
                NEXT™ Onboarding Suite
              </span>
            </div>
            <div className="flex items-center gap-6">
              <span
                className="text-gray-400"
                style={{ fontSize: `${misalign[1].size + 11}px` }}
              >
                {cycle > 0 ? `Hard Mode${cycle > 1 ? ` ×${cycle}` : ""}` : "Setup Wizard"}
              </span>
              <span className="text-gray-300 font-mono" style={{ fontSize: 11 }}>
                {fakePercent}% complete
              </span>
            </div>
          </div>

          {/* Fake progress bar */}
          {isActive(6) && (
            <div className="h-0.5 bg-gray-100 w-full relative overflow-hidden">
              <div
                className="h-full bg-gray-900"
                style={{
                  width: `${fakePercent}%`,
                  transition: "width 0.7s ease",
                }}
              />
            </div>
          )}

          {/* Main */}
          <div className="flex-1 flex flex-col items-center justify-center px-8 relative overflow-hidden">

            {/* Flash notification */}
            <div
              className="fixed top-6 right-6 bg-gray-900 text-white px-4 py-2 rounded-full z-50"
              style={{
                fontSize: 12,
                opacity: showFlash ? 1 : 0,
                transform: showFlash ? "translateY(0)" : "translateY(-10px)",
                transition: "opacity 0.4s ease, transform 0.4s ease",
                pointerEvents: "none",
              }}
            >
              {flashMsg}
            </div>

            {/* Congrats overlay */}
            {showCongrats && (
              <div className="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center fade-in">
                <p className="text-gray-900 font-light tracking-tight" style={{ fontSize: 36 }}>
                  Congratulations.
                </p>
                <p className="text-gray-400 mt-3" style={{ fontSize: 14 }}>
                  Unlocking Hard Mode™ — please wait.
                </p>
                <div className="mt-8 w-48 bg-gray-100 overflow-hidden" style={{ height: 2 }}>
                  <div
                    className="h-full bg-gray-900"
                    style={{ width: "100%", animation: "slideBar 3s linear forwards" }}
                  />
                </div>
                <style>{`@keyframes slideBar { from { width: 0% } to { width: 100% } }`}</style>
              </div>
            )}

            {/* Level header */}
            <div
              className="text-center mb-12"
              style={{
                transform: `translate(${misalign[2].x}px, ${misalign[2].y}px) rotate(${misalign[2].rot}deg)`,
              }}
            >
              <div
                className="text-gray-400 uppercase tracking-widest font-medium mb-2"
                style={{ fontSize: 11 }}
              >
                {getLevelLabel()}
              </div>
              <h1
                className="text-gray-900 font-light tracking-tight"
                style={{ fontSize: `${28 + misalign[3].size}px` }}
              >
                {getLevelSubtitle()}
              </h1>
              {cycle > 0 && (
                <p
                  className="text-red-400 font-medium tracking-wide mt-2"
                  style={{ fontSize: 11 }}
                >
                  ALL INCONVENIENCES ACTIVE
                </p>
              )}
            </div>

            {/* Step dots */}
            <div
              className="flex mb-10"
              style={{
                gap: 6,
                transform: `translate(${misalign[4].x}px, ${misalign[4].y}px)`,
              }}
            >
              {Array.from({ length: 10 }, (_, i) => (
                <div
                  key={i}
                  className="rounded-full"
                  style={{
                    width: i + 1 === activeLevel ? 20 : 6,
                    height: 6,
                    backgroundColor:
                      i + 1 < activeLevel || cycle > 0
                        ? "#111"
                        : i + 1 === activeLevel
                        ? "#111"
                        : "#e5e7eb",
                    transition: "width 0.3s ease, background-color 0.3s ease",
                  }}
                />
              ))}
            </div>

            {/* Active inconveniences */}
            {(activeLevel > 1 || cycle > 0) && (
              <div
                className="mb-10 text-center"
                style={{
                  transform: `translate(${misalign[5].x}px, ${misalign[5].y}px) rotate(${misalign[5].rot * 0.5}deg)`,
                }}
              >
                <p
                  className="text-gray-300 uppercase tracking-widest mb-3"
                  style={{ fontSize: 10 }}
                >
                  Active enhancements
                </p>
                <div className="flex flex-wrap gap-2 justify-center" style={{ maxWidth: 360 }}>
                  {isActive(2) && (
                    <span className="px-3 py-1 bg-gray-50 text-gray-500 rounded-full border border-gray-100" style={{ fontSize: 11 }}>
                      Evasive UI
                    </span>
                  )}
                  {isActive(3) && (
                    <span className="px-3 py-1 bg-gray-50 text-gray-500 rounded-full border border-gray-100" style={{ fontSize: 11 }}>
                      Hold Required
                    </span>
                  )}
                  {isActive(4) && (
                    <span className="px-3 py-1 bg-gray-50 text-gray-500 rounded-full border border-gray-100" style={{ fontSize: 11 }}>
                      Double Confirm
                    </span>
                  )}
                  {isActive(5) && (
                    <span className="px-3 py-1 bg-gray-50 text-gray-500 rounded-full border border-gray-100" style={{ fontSize: 11 }}>
                      Roaming Button
                    </span>
                  )}
                  {isActive(6) && (
                    <span className="px-3 py-1 bg-gray-50 text-gray-500 rounded-full border border-gray-100" style={{ fontSize: 11 }}>
                      Fake Progress
                    </span>
                  )}
                  {isActive(7) && (
                    <span className="px-3 py-1 bg-gray-50 text-gray-500 rounded-full border border-gray-100" style={{ fontSize: 11 }}>
                      300ms Lag
                    </span>
                  )}
                  {isActive(8) && (
                    <span className="px-3 py-1 bg-gray-50 text-gray-500 rounded-full border border-gray-100" style={{ fontSize: 11 }}>
                      Button Anxiety
                    </span>
                  )}
                  {isActive(9) && (
                    <span className="px-3 py-1 rounded-full border" style={{ fontSize: 11, background: "#fffbeb", color: "#d97706", borderColor: "#fde68a" }}>
                      Reality Tilt
                    </span>
                  )}
                </div>
              </div>
            )}

            {/* Hold ring */}
            {isActive(3) && !isActive(5) && (
              <div
                className="mb-6 relative flex items-center justify-center"
                style={{ width: 56, height: 56 }}
              >
                <svg
                  width="56"
                  height="56"
                  style={{ position: "absolute", transform: "rotate(-90deg)" }}
                >
                  <circle cx="28" cy="28" r="22" fill="none" stroke="#f3f4f6" strokeWidth="3" />
                  <circle
                    cx="28"
                    cy="28"
                    r="22"
                    fill="none"
                    stroke="#111"
                    strokeWidth="3"
                    strokeDasharray={`${2 * Math.PI * 22}`}
                    strokeDashoffset={`${2 * Math.PI * 22 * (1 - holdProgress / 100)}`}
                    strokeLinecap="round"
                    style={{ transition: "stroke-dashoffset 0.05s linear" }}
                  />
                </svg>
                <span
                  className="text-gray-400 font-mono"
                  style={{ fontSize: 11, position: "relative", zIndex: 1 }}
                >
                  {Math.floor(holdProgress)}%
                </span>
              </div>
            )}

            {/* The Button */}
            {renderButton()}

            {isActive(3) && !isActive(5) && (
              <p
                className="mt-3 text-gray-400"
                style={{
                  fontSize: 12,
                  transform: `translate(${misalign[6].x}px, 0)`,
                }}
              >
                {isHolding ? "Don't let go." : "Hold to continue."}
              </p>
            )}
          </div>

          {/* Footer */}
          <div
            className="border-t border-gray-50 px-8 py-4 flex items-center justify-between"
            style={{ transform: `translate(${misalign[7].x}px, ${misalign[7].y}px)` }}
          >
            <p
              className="text-gray-300"
              style={{ fontSize: `${10 + misalign[0].size}px` }}
            >
              © {new Date().getFullYear()} NEXT™ Corp. All inconveniences reserved.
            </p>
            <p className="text-gray-300 font-mono" style={{ fontSize: 11 }}>
              v{level}.{cycle}.{Math.floor(progressVal)}
            </p>
          </div>

          {/* Modal 1 */}
          {showModal && (
            <div
              className="fixed inset-0 z-50 flex items-center justify-center p-4"
              style={{ background: "rgba(0,0,0,0.2)", backdropFilter: "blur(4px)" }}
            >
              <div
                className="bg-white rounded-2xl p-8 border border-gray-100 fade-in"
                style={{
                  maxWidth: 380,
                  width: "100%",
                  boxShadow: "0 25px 60px rgba(0,0,0,0.12)",
                  transform: `rotate(${rand(-0.8, 0.8)}deg)`,
                }}
              >
                <div
                  className="flex items-center justify-center rounded-full mb-4"
                  style={{ width: 40, height: 40, background: "#fffbeb" }}
                >
                  <span style={{ fontSize: 18 }}>⚠</span>
                </div>
                <h2 className="text-gray-900 font-semibold tracking-tight mb-2" style={{ fontSize: 18 }}>
                  Confirm Action
                </h2>
                <p className="text-gray-500 mb-6 leading-relaxed" style={{ fontSize: 14 }}>
                  You are about to proceed. This action may or may not have consequences. We cannot
                  say for certain. By clicking confirm, you acknowledge that you understand, even if
                  you don't.
                </p>
                <div className="flex gap-3">
                  <button
                    className="flex-1 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50"
                    style={{ padding: "10px 0", fontSize: 14 }}
                    onClick={() => setShowModal(false)}
                  >
                    Cancel
                  </button>
                  <button
                    className="flex-1 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800"
                    style={{ padding: "10px 0", fontSize: 14 }}
                    onClick={() => {
                      setShowModal(false);
                      setShowModal2(true);
                    }}
                  >
                    Confirm
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Modal 2 */}
          {showModal2 && (
            <div
              className="fixed inset-0 z-50 flex items-center justify-center p-4"
              style={{ background: "rgba(0,0,0,0.3)", backdropFilter: "blur(4px)" }}
            >
              <div
                className="bg-white rounded-2xl p-8 border border-gray-100 fade-in"
                style={{
                  maxWidth: 380,
                  width: "100%",
                  boxShadow: "0 25px 60px rgba(0,0,0,0.15)",
                  transform: `rotate(${rand(-1.2, 1.2)}deg) scale(0.97)`,
                }}
              >
                <div
                  className="flex items-center justify-center rounded-full mb-4"
                  style={{ width: 40, height: 40, background: "#fef2f2" }}
                >
                  <span style={{ fontSize: 18 }}>⚠</span>
                </div>
                <h2 className="text-gray-900 font-semibold tracking-tight mb-2" style={{ fontSize: 18 }}>
                  Confirm Your Confirmation
                </h2>
                <p className="text-gray-500 mb-1 leading-relaxed" style={{ fontSize: 14 }}>
                  We need to confirm that you confirmed. This is standard.
                </p>
                <p className="text-gray-300 mb-6" style={{ fontSize: 12 }}>
                  Please do not close this window.
                </p>
                <div className="flex gap-3">
                  <button
                    className="flex-1 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50"
                    style={{ padding: "10px 0", fontSize: 14 }}
                    onClick={() => {
                      setShowModal2(false);
                      setShowModal(false);
                    }}
                  >
                    Actually, no
                  </button>
                  <button
                    className="flex-1 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800"
                    style={{ padding: "10px 0", fontSize: 14 }}
                    onClick={() => {
                      setShowModal2(false);
                      advanceLevel();
                    }}
                  >
                    Yes, confirmed
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<NextGame />);
  </script>
</body>
</html>
